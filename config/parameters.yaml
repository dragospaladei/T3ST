schema_version: 2

parameters:
  # --- Numerics time / iterations etc ---
  - name: t0
    kind: float
    units: "R0/vth"
    default: 0
    group: Numerics
    help: Starting time of the simulation

  - name: tc
    kind: float
    units: "R0/vth"
    default: -1
    group: Numerics
    help: Starting time of collisional processes

  - name: tt
    kind: float
    units: "R0/vth"
    default: -1
    group: Numerics
    help: Starting time of turbulence processes

  - name: tmax
    kind: float
    units: "R0/vth"
    default: 100
    min: 0
    group: Numerics
    help: Final time of the simulation

  - name: Nt
    kind: int
    units: "tmax/dt"
    default: 1000
    min: 1
    group: Numerics
    help: Number of time steps per simulation

  - name: Nreal
    kind: int
    default: 1
    min: 1
    group: Numerics
    help: Number of field realizations (if USE_real=ON, all Np particles are propagated in a single realization; if USE_real=OFF, this is equivalent to an additional Nloop)

  - name: Nc
    kind: int
    default: 50
    min: 1
    group: Numerics
    help: Number of Fourier modes used in the representation of turbulent fields (a few dozen is acceptable; the non-Gaussianity scales like 1/Nc)

  - name: Nloop
    kind: int
    default: 1
    min: 1
    group: Numerics
    help: Number of loops (a loop is equivalent to a batch of Np particles)

  - name: Np
    kind: int
    default: 50000
    min: 1
    group: Numerics
    help: Number of test particles per loop and per realization

  - name: ntraj
    kind: int
    default: 10
    min: 0
    group: Numerics
    help: Number of trajectories to be saved/exported with full time history (per loop and per realization)

  # --- Plasma / normalization ---
  - name: Ti
    kind: float
    units: "keV"
    default: 1
    group: Plasma
    help: Local H ion temperature (also used as the normalization quantity; note that "ions" can mean proton, deuterium, or even tritium)

  - name: Te
    kind: float
    units: "keV"
    default: 1
    group: Plasma
    help: Local electron temperature

  - name: Zeff
    kind: float
    units: "|e|"
    default: 1
    group: Plasma
    help: Bulk plasma effective charge (used only for the collision frequency calculation)

  - name: Aeff
    kind: float
    units: "mH"
    default: 2
    group: Plasma
    help: Bulk plasma effective mass (used only for the collision frequency calculation)

  - name: ndens
    kind: float
    units: "1e19 m^-3"
    default: 4
    group: Plasma
    help: Local plasma density (used only for the collision frequency calculation)

  # --- Gradients / drives ---
  - name: Ln
    kind: float
    default: 2.2
    group: Plasma
    help: R0/Ln (for ITG/TEM)

  - name: Li
    kind: float
    default: 6.9
    group: Plasma
    help: R0/LTi (right now, it's useless)

  - name: Le
    kind: float
    default: 6.9
    group: Plasma
    help: R0/LTe (right now, it's useless)

  # --- Geometry / equilibrium ---
  - name: magnetic_model
    kind: enum
    default: 4
    group: Equilibrium
    help: Magnetic geometry model
    choices:
      - value: 1
        label: EFIT
      - value: 2
        label: EFIT-sa
      - value: 3
        label: Solovev
      - value: 4
        label: Circular

  - name: B0
    kind: float
    units: "T"
    default: 1
    group: Equilibrium
    help: Major-axis magnetic field

  - name: R0
    kind: float
    units: "m"
    default: 1
    group: Equilibrium
    help: Major radius

  - name: a0
    kind: float
    units: "m"
    default: 0.5
    group: Equilibrium
    help: Minor radius

  - name: s1
    kind: float
    default: 0.8
    group: Equilibrium
    help: Safety-factor coefficient s1 in the model qpsi(rhot)=s1+s2*rhot+s3*rhot^2

  - name: s2
    kind: float
    default: 0.0
    group: Equilibrium
    help: Safety-factor coefficient s2 in the model qpsi(rhot)=s1+s2*rhot+s3*rhot^2

  - name: s3
    kind: float
    default: 2.2
    group: Equilibrium
    help: Safety-factor coefficient s3 in the model qpsi(rhot)=s1+s2*rhot+s3*rhot^2

  - name: amp
    kind: float
    units: "arb."
    group: Equilibrium
    help: Flux-surface amplitude (Solovev only)

  - name: elong
    kind: float
    group: Equilibrium
    help: Flux-surface elongation (Solovev only)

  - name: device
    kind: enum
    group: Equilibrium
    help: Device ID
    choices:
      - value: 1
        label: MAST
      - value: 2
        label: TCV
      - value: 3
        label: WEST

  - name: shot
    kind: int
    group: Equilibrium
    help: Shot number for equilibrium import

  - name: shotslice
    kind: int
    group: Equilibrium
    help: Time slice at which the equilibrium is evaluated

  # --- Rotation ---
  - name: Omgt0
    kind: float
    units: "1e3 Hz"
    default: 0
    group: Equilibrium
    help: Local toroidal angular frequency

  - name: Omgtprim
    kind: float
    default: 0
    group: Equilibrium
    help: Rhot scale length of toroidal rotation, dlnOmgt/drhot

  # --- Turbulence model ---
  - name: turb_model
    kind: enum
    default: 2
    group: Turbulence
    help: Choice of functional turbulence spectrum construction (1=old, no real tilting; 2=new, improved)
    choices:
      - value: 1
        label: old
      - value: 2
        label: new

  - name: x_corr
    kind: enum
    default: 1
    group: Turbulence
    help: Choice of x spectrum/correlation (1=Gaussian, 2=Cauchy, 3=alaGENE)
    choices:
      - value: 1
        label: Gaussian correlation
      - value: 2
        label: Exp correlation (Cauchy spectrum)
      - value: 3
        label: A la GENE correlation (Cauchy-like spectrum)

  - name: y_corr
    kind: enum
    default: 1
    group: Turbulence
    help: Choice of y spectrum/correlation (1=alaMadi, 2=alaGENE)
    choices:
      - value: 1
        label: alaMadi
      - value: 2
        label: A la GENE correlation (Cauchy-like spectrum)

  - name: t_corr
    kind: enum
    default: 2
    group: Turbulence
    help: Choice of t spectrum/correlation (1=Gaussian, 2=Cauchy)
    choices:
      - value: 1
        label: Gaussian correlation
      - value: 2
        label: Exp correlation (Cauchy spectrum)

  - name: Phi
    kind: float
    default: 0.01
    group: Turbulence
    help: Local turbulence amplitude (eA_phi/Ti)

  - name: turbprof
    kind: float
    default: 5
    group: Turbulence
    help: Artificial bending of turbulence at the core

  - name: Ai
    kind: float
    default: 1
    group: Turbulence
    help: ITG fraction

  - name: lambdax
    kind: float
    units: "rhoi"
    default: 5
    group: Turbulence
    help: Radial correlation length (along the field-aligned x direction)

  - name: lambday
    kind: float
    units: "rhoi"
    default: 5
    group: Turbulence
    help: Poloidal correlation length (along the field-aligned y direction)

  - name: lambdaz
    kind: float
    units: "q0*R0"
    default: 10.0
    group: Turbulence
    help: Parallel correlation length for saturated decoherent fluctuations

  - name: lbalonz
    kind: float
    units: "q0*R0"
    default: 10.0
    group: Turbulence
    help: Parallel correlation length for the ballooning envelope (0 gives strong localization of the turbulence at the LFS; generally >1 for good numerical convergence and <100 for numerical stability)

  - name: tauc
    kind: float
    units: "R0/vth"
    default: 10
    group: Turbulence
    help: Decorrelation time

  - name: k0i
    kind: float
    units: "1/rhoi"
    default: 0.1
    group: Turbulence
    help: Dominant wavenumber for ITG

  - name: k0e
    kind: float
    units: "1/rhoi"
    default: 0.1
    group: Turbulence
    help: Dominant wavenumber for TEM

  - name: gamma_ZF
    kind: float
    units: "vth/R0"
    default: 0.0
    group: Turbulence
    help: Zonal-flow shearing rate

  # --- Particle Initial Conditions / markers ---
  - name: X0
    kind: float
    units: "m"
    default: 1.95
    group: "Particle Initial Conditions"
    help: Cylindrical R reference position

  - name: Y0
    kind: float
    units: "m"
    default: 0.0
    group: "Particle Initial Conditions"
    help: Cylindrical Z reference position

  - name: Z0
    kind: float
    units: "rad"
    default: 0.0
    group: "Particle Initial Conditions"
    help: Cylindrical phi reference position

  - name: Ts
    kind: float
    units: "Ti"
    default: 1.0
    group: "Particle Initial Conditions"
    help: Local species temperature (normalized to Ti); relevant only for a Maxwell-Boltzmann distribution

  - name: Es
    kind: float
    units: "Ti"
    default: 1.0
    group: "Particle Initial Conditions"
    help: Local species energy (normalized to Ti); relevant only for a single-energy distribution

  - name: pitch
    kind: float
    min: -1
    max: 1
    default: 0.5
    group: "Particle Initial Conditions"
    help: Reference pitch angle; relevant only for a fixed-pitch distribution

  - name: As
    kind: float
    units: "mH"
    default: 1
    group: "Particle Initial Conditions"
    help: Species mass

  - name: Zs
    kind: float
    units: "|e|"
    default: 1
    group: "Particle Initial Conditions"
    help: Species charge

  - name: position_type
    kind: enum
    default: 2
    group: "Particle Initial Conditions"
    help: Initial position distribution
    choices:
      - value: 1
        label: fixed_point
      - value: 2
        label: flux_surface
      - value: 3
        label: annulus

  - name: pitch_type
    kind: enum
    default: 2
    group: "Particle Initial Conditions"
    help: Initial pitch distribution
    choices:
      - value: 1
        label: fixed_pitch
      - value: 2
        label: uniform_pitch

  - name: energy_type
    kind: enum
    default: 2
    group: "Particle Initial Conditions"
    help: Initial energy distribution
    choices:
      - value: 1
        label: fixed_energy
      - value: 2
        label: Boltzmann

  # --- Switches (0/1 integers for Fortran) ---
  - name: USE_larmor
    kind: int
    min: 0
    max: 1
    default: 0
    ui: checkbox
    group: Switches
    help: Finite-Larmor-radius effects [J0] (1=yes, 0=no)

  - name: USE_coll
    kind: int
    min: 0
    max: 1
    default: 0
    ui: checkbox
    group: Switches
    help: Collisional effects (1=yes, 0=no)

  - name: USE_turb
    kind: int
    min: 0
    max: 1
    default: 1
    ui: checkbox
    group: Switches
    help: Turbulence effects (1=yes, 0=no)

  - name: USE_magnturb
    kind: int
    min: 0
    max: 1
    default: 0
    ui: checkbox
    group: Switches
    help: RMP presence (1=yes, 0=no)

  - name: USE_freq
    kind: int
    min: 0
    max: 1
    default: 1
    ui: checkbox
    group: Switches
    help: Time dependence of turbulent fields (1=time-dependent, 0=frozen fields)

  - name: USE_polar
    kind: int
    min: 0
    max: 1
    default: 0
    ui: checkbox
    group: Switches
    help: Polarization-drift effects (1=yes, 0=no)

  - name: USE_PC
    kind: int
    min: 0
    max: 1
    default: 0
    ui: checkbox
    group: Switches
    help: Canonical-momentum flux tube (1=yes, 0=no)

  - name: USE_real
    kind: int
    min: 0
    max: 1
    default: 0
    ui: checkbox
    group: Switches
    help: Field realizations (1=yes - a single realization; 0=no - one field realization per particle)

  - name: USE_corr
    kind: int
    min: 0
    max: 1
    default: 0
    ui: checkbox
    group: Switches
    help: Save/compute Lagrangian correlations

  - name: USE_balloon
    kind: int
    min: 0
    max: 1
    default: 0
    ui: checkbox
    group: Switches
    help: Ballooning effects [g(z) = exp(cos(z)*lbalonz**2?)] (1=yes, 0=no)

  - name: USE_tilt
    kind: int
    min: 0
    max: 1
    default: 0
    ui: checkbox
    group: Switches
    help: Tilting effects ~ s ky z (1=yes, 0=no)

  - name: USE_testing
    kind: int
    min: 0
    max: 1
    default: 0
    ui: checkbox
    group: Switches
    help: Run test routines (1=yes, 0=no)
